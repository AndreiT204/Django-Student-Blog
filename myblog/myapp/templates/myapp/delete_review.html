{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Review</title>
    <link rel="stylesheet" href="{% static 'css/delete_review.css' %}" />
  </head>
  <body>
    <div class="container">
      <h1>Delete Review</h1>
      <p>Are you sure you want to delete the review by {{ review.email }}?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{% url 'index' %}">Cancel</a>
      </form>
    </div>
  </body>
</html>
