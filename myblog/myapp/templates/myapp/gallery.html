{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totorean Andrei-Gallery</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/navbar.css' %}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/gallery.css' %}"
    />
    <script defer src="{% static 'js/gallery.js' %}"></script>
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="logo">Welcome to Totorean Andrei's Blog</div>
        <button class="toggle-button" id="menu-toggle">&#9776;</button>
        <div class="nav-links" id="nav-links">
          <a href="{% url 'index' %}">Index</a>
          <a href="{% url 'about' %}">About</a>
          <div class="dropdown">
            <a href="#">Pages ▼</a>
            <div class="dropdown-content">
              <a href="{% url 'form' %}">Form</a>
              <a href="{% url 'gallery' %}">Gallery</a>
              <a href="{% url 'chatbot' %}">Chatbot</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    {% block content %}
    <main class="slider-container">
      <div class="slider">
        <div class="slides">
          <img
            src="{% static 'Images/post1.jpg' %}"
            alt="image1"
            class="imageContainer"
          />
          <img
            src="{% static 'Images/post2.jpg' %}"
            alt="image2"
            class="imageContainer"
          />
          <img
            src="{% static 'Images/post3.jpg' %}"
            alt="image3"
            class="imageContainer"
          />
        </div>
        <button class="prev" onclick="prevSlide()">&#10094;</button>
        <button class="next" onclick="nextSlide()">&#10095;</button>
      </div>
    </main>
    {% endblock %}
  </body>
</html>
